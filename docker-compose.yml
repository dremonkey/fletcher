services:
  livekit:
    image: livekit/livekit-server:latest
    command: "--config /etc/livekit.yaml --keys '${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'"
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7880"]
      interval: 2s
      timeout: 3s
      retries: 15
  piper:
    image: waveoffire/piper-tts-server
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities: [gpu]
  voice-agent:
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    network_mode: host
    env_file: .env
    environment:
      LIVEKIT_URL: ws://localhost:7880
      OPENCLAW_GATEWAY_URL: http://localhost:18789
      PIPER_URL: http://localhost:5000
      DEBUG: ganglia:*
      LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      livekit:
        condition: service_healthy
      piper:
        condition: service_started
    restart: unless-stopped
