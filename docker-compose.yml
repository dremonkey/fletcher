services:
  livekit:
    image: livekit/livekit-server:latest
    command: "--config /etc/livekit.yaml --keys '${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'"
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7880"]
      interval: 2s
      timeout: 3s
      retries: 15
  piper:
    image: waveoffire/piper-tts-server
    command: python3.10 -m piper.http_server --model /models/en_US-lessac-medium.onnx --cuda
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./models/piper:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities: [gpu]
  token-server:
    image: oven/bun:1
    working_dir: /app
    entrypoint: ["bun", "run", "scripts/token-server.ts"]
    network_mode: host
    env_file: .env
    environment:
      LIVEKIT_URL: ws://localhost:7880
      TOKEN_SERVER_PORT: 7882
    volumes:
      - ./scripts/token-server.ts:/app/scripts/token-server.ts:ro
      - ./node_modules:/app/node_modules:ro
      - ./package.json:/app/package.json:ro
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped
  voice-agent:
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    init: true
    network_mode: host
    env_file: .env
    volumes:
      - ./heap-snapshots:/tmp/heap-snapshots
    environment:
      LIVEKIT_URL: ws://localhost:7880
      PIPER_URL: http://localhost:5000
      GANGLIA_TYPE: relay
      DEBUG: ganglia:*
      LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      livekit:
        condition: service_healthy
      piper:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
